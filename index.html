<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Site Básico</title>

  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:#f4f4f4;
    }

    header{
      background:#0077ff;
      color:white;
      padding:20px;
      text-align:center;
    }

    nav{
      background:#005fcc;
      padding:10px;
      text-align:center;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin:0 15px;
      font-weight:bold;
    }

    section{
      padding:30px;
      text-align:center;
    }

    .card{
      background:white;
      width:300px;
      margin:20px auto;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    footer{
      background:#222;
      color:white;
      text-align:center;
      padding:15px;
      margin-top:20px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Meu Primeiro Site</h1>
    <p>Site básico feito em HTML e CSS</p>
  </header>

  <nav>
    <a href="#">Início</a>
    <a href="#">Sobre</a>
    <a href="#">Contato</a>
  </nav>

  <section>
    <h2>Bem-vindo!</h2>
    <p>Esse é um exemplo de site simples.</p>

    <div class="card">
      <h3>Card Exemplo</h3>
      <p>Você pode adicionar textos, imagens e botões aqui.</p>
      <button>Clique Aqui</button>
    </div>
  </section>

  <footer>
    <p>© 2026 Meu Site - Todos os direitos reservados</p>
  </footer>

</body>
</html>
